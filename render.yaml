services:
  - type: web
    name: market-regime-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --host=0.0.0.0 --port=$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CACHE_SECONDS
        value: "900"
      - key: USERS_JSON
        sync: false
